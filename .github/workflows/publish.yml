name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and GitHub release
    if: github.repository == 'criticaldeveloper/critical-boiler'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.1.2
          run_install: false

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install an OIDC-capable npm CLI
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and package versions
        run: node ./scripts/verify-release-tag.js "$GITHUB_REF_NAME"

      - name: Check syntax
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Run CLI smoke test
        run: pnpm smoke

      - name: Inspect package contents
        run: pnpm pack --dry-run

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --draft --generate-notes --title "$GITHUB_REF_NAME"
          fi

      - name: Publish package to npm with OIDC
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          published_version=$(npm view "$package_name@$package_version" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)

          if [ "$published_version" = "$package_version" ]; then
            echo "$package_name@$package_version is already published; skipping npm publish."
          else
            npm publish --access public --provenance
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
